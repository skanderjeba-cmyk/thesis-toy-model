globals:
  alpha: 0.33
  delta: 0.06
  phi_M: 0.90
  g_A: 0.0          # common productivity growth
  q_star: 1.0       # scale for q-based intensity (q = Y/L)
  eta: 0.30         # elasticity in eps(q) = epsilon * (q/q_star)^eta

countries:
  # Developed: higher saving, older workforce (lower active-labor share),
  # lower epsilon, stronger abatement responsiveness and cap.
  D:
    s: 0.26
    f: 0.003
    epsilon: 0.45
    kappa: 0.20
    xi: 0.45
    theta_bar: 0.85
    zeta: 0.92     # active-labor share (L = zeta * N)
    # zeta_schedule: [0.92, 0.92, 0.91, ...]  # optional: time path

  # Developing: lower saving, higher net natural increase, higher epsilon,
  # weaker abatement responsiveness and lower cap, near-full active labor.
  L:
    s: 0.20
    f: 0.015
    epsilon: 0.70
    kappa: 0.20
    xi: 0.25
    theta_bar: 0.65
    zeta: 0.98
    # zeta_schedule: [0.98, 0.98, 0.98, ...]  # optional

migration:
  mu: 0.06
  tau_H: 0.08          # headcount policy wedge (persons/period)
  m_bar: 0.10          # persons cap as a share of N_L
  mig_slack: 0.02      # strict-slack buffer so (1+f_L) branch stays slack

initial_state:
  K_D: 1.0
  K_L: 1.0
  N_D: 1.0
  N_L: 1.0
  A0_D: 1.0
  A0_L: 1.0
  M0: 0.0

simulation:
  T: 200

# Scenario overlays (for figures/tables) — no toggles anywhere
scenarios:
  high_abatement:
    countries:
      D: { xi: 0.60, theta_bar: 0.90 }
      L: { xi: 0.40, theta_bar: 0.80 }

  ease_migration:
    migration: { mu: 0.10, tau_H: 0.05 }

  aging_in_D:          # was lower_zeta_D
    countries: { D: { zeta: 0.90 } }
